    name: "五大策略报告 - 9:20"
    description: "工作日早盘 9:20 推送选股报告"
    schedule: "20 9 * * 1-5"  # 周一到周五 9:20
    command: "python3 C:\\Users\\admin\\.qclaw\\workspace\\cron_report.py"
    enabled: true
    delivery:
      mode: "announce"
      channel: "weixin"
      to: "老板"  # 发送给用户

